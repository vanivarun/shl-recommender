services:
  - type: web
    name: shl-recommender
    env: python
    buildCommand: pip install -r requirements.txt && python -c "from agent.retriever import build_index; build_index()"
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false